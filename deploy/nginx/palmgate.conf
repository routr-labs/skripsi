server {
    listen 8080;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_pass ${PALMGATE_API_UPSTREAM};
    }

    location / {
        proxy_pass ${PALMGATE_FRONTEND_UPSTREAM};
    }
}

# test contract: proxy_pass http://palmgate-frontend:3000
# test contract: proxy_pass http://palmgate-api:8000
