x-palmgate-common: &palmgate-common
  build: .
  container_name: palmgate
  restart: unless-stopped

  env_file:
    - .env

  expose:
    - "8000"

  volumes:
    # ML model files live under the project models/ directory.
    - ${PALMGATE_MODELS_DIR:-./models}/${MODEL_VERSION:-embedding_new_roi_v2}:/app/models/${MODEL_VERSION:-embedding_new_roi_v2}:ro
    - ./hand_landmarker.task:/app/hand_landmarker.task:ro
    # Persistent storage for the SQLite database.
    - palmgate-db:/data
    # Save registration captures into ./data/captures on the host.
    - ./data/captures:/data/captures

  # Optional: uncomment to limit resource usage on a small VPS
  # deploy:
  #   resources:
  #     limits:
  #       memory: 1g

x-cloudflared-common: &cloudflared-common
  image: cloudflare/cloudflared:latest
  container_name: palmgate-cloudflared
  restart: unless-stopped
  command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

services:
  palmgate-browser:
    <<: *palmgate-common
    profiles: ["browser"]
    environment:
      # Database is stored in the named volume below so it survives rebuilds.
      - DB_PATH=/data/palmprint.db
      - MODEL_VERSION=${MODEL_VERSION:-embedding_new_roi_v2}
      # Browser mode: use a phone/laptop camera through the web UI.
      - DEVICE_RUNTIME_ENABLED=0
      - CAMERA_SOURCE=browser

  palmgate-usb:
    <<: *palmgate-common
    profiles: ["usb"]
    environment:
      # Database is stored in the named volume below so it survives rebuilds.
      - DB_PATH=/data/palmprint.db
      - MODEL_VERSION=${MODEL_VERSION:-embedding_new_roi_v2}
      # USB mode: use the Orange Pi USB camera for registration and recognition.
      - DEVICE_RUNTIME_ENABLED=1
      - CAMERA_SOURCE=usb
      - CAMERA_DEVICE_PATH=${CAMERA_DEVICE_PATH:-/dev/video0}
      - DEVICE_PREVIEW_FRAME_INTERVAL_MS=33
      - DEVICE_FRAME_INTERVAL_MS=250
      - LOCK_GPIO_ENABLED=${LOCK_GPIO_ENABLED:-0}
      - LOCK_GPIO_CHIP=${LOCK_GPIO_CHIP:-/dev/gpiochip0}
      - LOCK_GPIO_LINE=${LOCK_GPIO_LINE:-75}
      - LOCK_ACTIVE_LOW=${LOCK_ACTIVE_LOW:-1}
      - LOCK_UNLOCK_MS=${LOCK_UNLOCK_MS:-2000}
    devices:
      - ${CAMERA_DEVICE_PATH:-/dev/video0}:${CAMERA_DEVICE_PATH:-/dev/video0}
      - ${LOCK_GPIO_CHIP:-/dev/gpiochip0}:${LOCK_GPIO_CHIP:-/dev/gpiochip0}

  cloudflared-browser:
    <<: *cloudflared-common
    profiles: ["browser"]
    depends_on:
      - palmgate-browser

  cloudflared-usb:
    <<: *cloudflared-common
    profiles: ["usb"]
    depends_on:
      - palmgate-usb

volumes:
  palmgate-db:
    driver: local
